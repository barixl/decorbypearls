{% extends 'admin/base.html' %}

{% block admin_content %}
<div class="header">
    <h1>Dashboard <em>Overview</em></h1>
</div>

<div class="stats-grid">
    <div class="stat-card">
        <div class="stat-icon"><i class="ri-article-line"></i></div>
        <div class="stat-info">
            <h3>Total Blogs</h3>
            <p>{{ blog_count }}</p>
        </div>
    </div>
    <div class="stat-card">
        <div class="stat-icon"><i class="ri-message-3-line"></i></div>
        <div class="stat-info">
            <h3>Pending Testimonials</h3>
            <p>{{ pending_count }}</p>
        </div>
    </div>
</div>

<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px;">
    <div class="admin-card" style="background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05);">
        <h2 style="font-family: 'Cormorant Garamond', serif; margin-bottom: 20px;">Quick Actions</h2>
        <div style="display: flex; gap: 15px; flex-wrap: wrap;">
            <a href="{{ url_for('new_blog') }}" class="btn btn-primary"><i class="ri-add-line"></i> Write New Blog</a>
            <a href="{{ url_for('admin_testimonials') }}" class="btn btn-primary"><i class="ri-check-line"></i> Review Testimonials</a>
        </div>
    </div>
</div>
{% endblock %}
